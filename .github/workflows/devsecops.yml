name: DevSecOps pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
            pip install -r requirements.txt
            pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
            PYTHONPATH: ${{ github.workspace }}
        run: pytest -v --cov --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml --cov-report=html tests/

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-xml
          path: coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  sast:
    name: Static Application Security Testing
    runs-on: self-hosted
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt update && sudo apt install unzip

      - name: Download coverage report artifact
        uses: actions/download-artifact@v7
        with:
          name: coverage-report-xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sca:
    name: "Trivy SCA Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy SCA Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: '.'
          scanners: "vuln"
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: '0'

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full git history so Gitleaks scans every commit

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        # NOTE: app.py contains INTENTIONAL hardcoded secrets as scan targets.
        # continue-on-error keeps the pipeline green while still reporting findings
        # in the job logs. In a real repo, remove this so leaked secrets FAIL the build.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: [sast, sca]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Flask application
        run: |
          python app.py &
          echo "Waiting for Flask to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Flask is running!"
              break
            fi
            sleep 1
          done

      - name: OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: "http://localhost:5000"
          allow_issue_writing: false